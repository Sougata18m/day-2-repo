<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Academy | Student Course Enrollment</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="enrollment-container">
        <header class="form-header">
            <span class="logo-text">NEXUS ACADEMY</span>
    </div>
    <h1>Course Enrollment</h1>
    <p>Empower your future. Select your program and begin your learning journey today.</p>
    </header>

    <legend>Personal Information</legend>

    <div class="form-grid">
        <div class="form-group">
            <label for="fullName">Full Name</label>
            <div class="input-wrapper">
                <input type="text" id="fullName" name="fullName" placeholder="e.g., Alex Carter" required
                    autocomplete="name">
                <span class="focus-border"></span>
            </div>
        </div>

        <div class="form-group">
            <label for="dob">Date of Birth</label>
            <div class="input-wrapper">
                <input type="date" id="dob" name="dob" required>
                <span class="focus-border"></span>
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
                <input type="email" id="email" name="email" placeholder="alex@example.com" required
                    autocomplete="email">
                <span class="focus-border"></span>
            </div>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <div class="input-wrapper">
                <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required autocomplete="tel">
                <span class="focus-border"></span>
            </div>
        </div>
    </div>

    <legend>Academic Selection</legend>
    <div class="form-grid">
        <div class="form-group">
            <label for="course">Desired Course</label>
            <div class="input-wrapper select-wrapper">
                <select id="course" name="course" required>
                    <option value="" disabled selected>Select a program...</option>
                    <option value="ai-ml">Artificial Intelligence & Machine Learning</option>
                    <option value="fullstack">Full-Stack Web Development</option>
                    <option value="cybersecurity">Cybersecurity & Ethical Hacking</option>
                    <option value="datascience">Data Science & Analytics</option>
                    <option value="uiux">UI/UX Design & Product Strategy</option>
                </select>
                <span class="focus-border"></span>
            </div>
        </div>

        <div class="form-group">
            <label for="experience">Experience Level</label>
            <div class="input-wrapper select-wrapper">
                <select id="experience" name="experience" required>
                    <option value="" disabled selected>Choose your current level...</option>
                    <option value="beginner">Beginner (No prior coding experience)</option>
                    <option value="intermediate">Intermediate (Some programming knowledge)</option>
                    <option value="advanced">Advanced (Professional or solid technical background)</option>
                </select>
                <span class="focus-border"></span>
            </div>
        </div>
    </div>

    <div class="form-group full-width">
        <label for="motivation">Why do you want to enroll in this course?</label>
        <div class="input-wrapper">
            <textarea id="motivation" name="motivation" rows="4"
                placeholder="Tell us briefly about your goals and expectations..." required></textarea>
            <span class="focus-border"></span>
        </div>
    </div>

    <button type="submit" class="submit-btn">
        <span>Complete Enrollment</span>
    </button>
    </div>
    </form>
</body>

</html>
